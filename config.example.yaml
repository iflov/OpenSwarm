# PR Auto-Improvement
prProcessor:
  enabled: true
  schedule: "*/15 * * * *" # Check every 15 minutes
  cooldownHours: 6 # Wait 6 hours after processing
  maxIterations: 3 # Max 3 Worker-Reviewer iterations
